<!DOCTYPE html>
<html>
<head>
  <title>Bulk STK Push</title>
</head>
<body>

<h2>Bulk STK Push (Palpluss)</h2>

<textarea id="numbers" rows="10" cols="40" placeholder="Enter numbers, one per line"></textarea><br><br>

<input type="number" id="amount" placeholder="Amount"><br><br>
<input type="text" id="reference" placeholder="Reference"><br><br>
<input type="text" id="description" placeholder="Description"><br><br>

<button onclick="sendSTK()">Send STK Push</button>

<pre id="result"></pre>

<script>
async function sendSTK() {
  const numbers = document.getElementById('numbers').value
    .split('\n')
    .filter(n => n.trim() !== '');

  const amount = document.getElementById('amount').value;
  const reference = document.getElementById('reference').value;
  const description = document.getElementById('description').value;

  const res = await fetch('/send-bulk', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ numbers, amount, reference, description })
  });

  const data = await res.json();
  document.getElementById('result').innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
